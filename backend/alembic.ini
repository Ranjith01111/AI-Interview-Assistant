# Alembic Configuration File
#
# This file is used by Alembic to manage database migrations for the
# AI Interview Assistant backend.

[alembic]
# Path to the migration scripts directory
script_location = alembic

# Template used to generate migration files
# file_template = %%(rev)s_%%(slug)s

# Timezone to use when rendering the date within migration scripts
# timezone =

# Max length of characters to apply to the "slug" field
# truncate_slug_length = 40

# Set to 'true' to run the environment during the 'revision' command,
# regardless of autogenerate
# revision_environment = false

# Set to 'true' to allow .pyc and .pyo files without
# having their .py counterpart in the versions folder
# sourceless = false

# Version location specification — can be configured to allow
# version files to exist in multiple directories
# version_locations = %(here)s/bar:%(here)s/bat:alembic/versions

# Version path separator — OS-dependent, or ':', ';'
# version_path_separator = os
# version_path_separator = :
# version_path_separator = ;

# The output encoding used when revision files are written from script.py.mako
output_encoding = utf-8

# SQLAlchemy connection URL
# This is overridden in env.py to read from Settings
sqlalchemy.url = postgresql+asyncpg://postgres:postgres@localhost:5432/interview_assistant


[post_write_hooks]
# Uncomment to auto-format with black after generating migrations:
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 100 REVISION_SCRIPT_FILENAME

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
